<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - Finflux</title>
</head>
<body>

<h2>Login</h2>

<form id="loginForm">
    <label>Email:</label><br>
    <input type="email" id="email" required><br><br>

    <label>Senha:</label><br>
    <input type="password" id="senha" required><br><br>

    <button type="submit">Entrar</button>
</form>

<p id="mensagem"></p>

<script>
document.getElementById("loginForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;

    document.getElementById("mensagem").innerText = "Verificando...";

    const response = await fetch("http://127.0.0.1:8000/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ email, senha })
    });

    const data = await response.json();

    if (response.ok) {
        document.getElementById("mensagem").innerText = "Login sucesso!";
    } else {
        document.getElementById("mensagem").innerText = "Erro no login!";
    }

    console.log(data);
});
</script>

</body>
</html>
